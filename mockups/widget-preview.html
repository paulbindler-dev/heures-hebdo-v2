<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Widget Preview — Heures Hebdo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    background: #1C1C1E;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    padding: 56px 24px;
  }

  h2 {
    color: #636366;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .label {
    color: #48484A;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* iOS Small widget shell */
  .widget {
    width: 155px;
    height: 155px;
    background: #FFFFFF;
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      0 2px 8px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }

  .clock-ticks {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .widget-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    position: relative;
    z-index: 1;
  }

  .context {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #8E8E93;
    line-height: 1;
    margin-bottom: 2px;
  }

  .time {
    font-size: 34px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #000000;
  }

  .delta {
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: 0.01em;
  }

  /* Delta colors — iOS system palette */
  .green  .delta { color: #34C759; }
  .blue   .delta { color: #007AFF; }
  .red    .delta { color: #FF3B30; }
  .muted  .time  { color: #8E8E93; }
  .muted  .delta { color: #C7C7CC; }

  /* iPhone frame */
  .phone-frame {
    position: relative;
    width: 290px;
    background: #000;
    border-radius: 46px;
    padding: 64px 24px 44px;
    box-shadow:
      0 0 0 1px #3A3A3C,
      0 24px 64px rgba(0,0,0,0.8);
  }

  .phone-notch {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 96px;
    height: 26px;
    background: #000;
    border-radius: 13px;
    border: 1px solid #2C2C2E;
  }

  .phone-wallpaper {
    background: linear-gradient(160deg, #2C3E50 0%, #1A1A2E 100%);
    border-radius: 30px;
    padding: 16px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: flex-start;
  }

  .phone-widget-row {
    width: 100%;
    display: flex;
    gap: 10px;
    margin-bottom: 4px;
  }

  .phone-widget-row .widget {
    width: 116px;
    height: 116px;
    border-radius: 16px;
  }

  .phone-widget-row .widget .context { font-size: 7px; }
  .phone-widget-row .widget .time    { font-size: 26px; }
  .phone-widget-row .widget .delta   { font-size: 10px; }

  .app-icon {
    width: 56px;
    height: 56px;
    border-radius: 13px;
    background: rgba(255,255,255,0.08);
  }
</style>
</head>
<body>

<h2>Widget Heures Hebdo — iOS Clock Face</h2>

<div class="row">

  <div class="col">
    <div class="widget green">
      <svg class="clock-ticks" viewBox="0 0 155 155"></svg>
      <div class="widget-inner">
        <span class="context">Arrivée</span>
        <span class="time">07:30</span>
        <span class="delta">+47 min</span>
      </div>
    </div>
    <span class="label">Objectif ok</span>
  </div>

  <div class="col">
    <div class="widget blue">
      <svg class="clock-ticks" viewBox="0 0 155 155"></svg>
      <div class="widget-inner">
        <span class="context">Arrivée demain</span>
        <span class="time">07:30</span>
        <span class="delta">+1h23</span>
      </div>
    </div>
    <span class="label">Bonus +30'</span>
  </div>

  <div class="col">
    <div class="widget red">
      <svg class="clock-ticks" viewBox="0 0 155 155"></svg>
      <div class="widget-inner">
        <span class="context">Reprise midi</span>
        <span class="time">13:30</span>
        <span class="delta">−18 min</span>
      </div>
    </div>
    <span class="label">Déficit</span>
  </div>

  <div class="col">
    <div class="widget muted">
      <svg class="clock-ticks" viewBox="0 0 155 155"></svg>
      <div class="widget-inner">
        <span class="context">Arrivée</span>
        <span class="time">—</span>
      </div>
    </div>
    <span class="label">Sans données</span>
  </div>

</div>

<!-- iPhone frame -->
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-wallpaper">
    <div class="phone-widget-row">
      <div class="widget green">
        <svg class="clock-ticks" viewBox="0 0 116 116" data-size="116"></svg>
        <div class="widget-inner">
          <span class="context">Arrivée</span>
          <span class="time">07:30</span>
          <span class="delta">+47 min</span>
        </div>
      </div>
      <div class="widget red">
        <svg class="clock-ticks" viewBox="0 0 116 116" data-size="116"></svg>
        <div class="widget-inner">
          <span class="context">Reprise midi</span>
          <span class="time">13:30</span>
          <span class="delta">−18 min</span>
        </div>
      </div>
    </div>
    <div class="app-icon"></div>
    <div class="app-icon"></div>
    <div class="app-icon"></div>
    <div class="app-icon"></div>
    <div class="app-icon"></div>
    <div class="app-icon"></div>
  </div>
</div>

<script>
function drawTicks(svg) {
  const size = parseFloat(svg.getAttribute('data-size') || svg.viewBox?.baseVal?.width || 155);
  const cx = size / 2, cy = size / 2;
  const outerR = size * 0.455;

  for (let i = 0; i < 60; i++) {
    const angle = ((i * 6) - 90) * (Math.PI / 180);
    const isHour = i % 5 === 0;
    const tickLen  = isHour ? size * 0.055 : size * 0.027;
    const sw       = isHour ? 1.5 : 0.8;
    const color    = isHour ? '#8E8E93' : '#C7C7CC';

    const x1 = cx + outerR * Math.cos(angle);
    const y1 = cy + outerR * Math.sin(angle);
    const x2 = cx + (outerR - tickLen) * Math.cos(angle);
    const y2 = cy + (outerR - tickLen) * Math.sin(angle);

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1.toFixed(2));
    line.setAttribute('y1', y1.toFixed(2));
    line.setAttribute('x2', x2.toFixed(2));
    line.setAttribute('y2', y2.toFixed(2));
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', sw);
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  }
}

document.querySelectorAll('.clock-ticks').forEach(drawTicks);
</script>
</body>
</html>
