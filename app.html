<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Heures Hebdo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg:#F7F6F3;--surface:#FFF;--surface2:#F9F9F7;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.14);
  --text:#111110;--text2:#5C5B57;--text3:#A09E98;--text4:#CCCAC4;
  --green:#16A34A;--red:#DC2626;--red-bg:#FEF2F2;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --mono:'JetBrains Mono','Fira Mono',monospace;
  --sans:'Inter',-apple-system,sans-serif;
  --r:10px;--r-lg:14px;--r-xl:18px;
  --surface-hover:#F3F2EF;--surface-focus:#F0EFEC;
  --total-row-bg:#F2F1EE;--overlay-bg:rgba(17,17,16,0.4);
  --ferie-text:#C2610A;--ferie-bg:#FFF4E6;
  --primary-bg:#111110;--primary-hover:#2A2926;--primary-fg:#FFFFFF;
  --neg-border:rgba(220,38,38,0.2);--bonus-border:rgba(37,99,235,0.2);
  --placeholder:#A09E98;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:28px 14px 80px;-webkit-font-smoothing:antialiased;}
.app{max-width:860px;width:100%;margin:0 auto;}

/* Header */
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:9px;}

.app-name{font-size:11px;font-weight:400;color:var(--text3);margin-bottom:5px;}
.week-sub{font-size:28px;font-weight:700;letter-spacing:-0.04em;color:var(--text);line-height:1;}
.header-actions{display:flex;gap:7px;flex-wrap:wrap;}
.btn{font-family:var(--sans);font-size:12px;font-weight:500;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);padding:7px 13px;cursor:pointer;transition:background .12s,color .12s;white-space:nowrap;line-height:1;}
.btn:hover{background:var(--surface-hover);color:var(--text);}
.btn-primary{background:var(--primary-bg);color:var(--primary-fg);border-color:var(--primary-bg);padding:7px 13px;font-size:12px;}
.btn-primary:hover{background:var(--primary-hover);color:var(--primary-fg);border-color:var(--primary-hover);}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:14px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 15px;}
.stat-label{font-size:10px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.stat-val{font-family:var(--sans);font-size:48px;font-weight:600;letter-spacing:-0.03em;line-height:1;color:var(--text3);}
.stat-val.pos{color:var(--green);}
.stat-val.neg{color:var(--red);}
.stat-val.bonus{color:var(--blue);}
.stat.bonus-stat{background:var(--blue-bg);border-color:var(--bonus-border);}
.stat.neg-stat{background:var(--red-bg);border-color:var(--neg-border);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--sans);}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;}

/* Table — fixed layout with explicit equal day columns */
.main-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.main-table colgroup col.lbl-col{width:90px;}

.main-table thead th{
  padding:10px 4px 9px;text-align:center;
  font-size:11px;font-weight:600;color:var(--text2);
  border-bottom:1px solid var(--border);background:var(--surface2);
  overflow:hidden;position:relative;
}
.main-table thead th:first-child{text-align:left;padding-left:12px;color:var(--text4);font-weight:400;font-size:10px;}

.day-th-inner{display:flex;flex-direction:column;align-items:center;}
.day-name{font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;}
.day-actions{position:absolute;right:4px;top:50%;transform:translateY(-50%);display:flex;gap:2px;align-items:center;}

.btn-day{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:4px;border:1px solid var(--border2);
  background:transparent;color:var(--text3);
  cursor:pointer;transition:color .12s,background .12s,border-color .12s,opacity .15s;padding:0;
  font-family:var(--sans);font-weight:600;user-select:none;
  opacity:0;
}
.day-th:hover .btn-day,.btn-day:focus-visible{opacity:1;}
.btn-day:hover{color:var(--primary-fg);background:var(--primary-bg);border-color:var(--primary-bg);}
.btn-day.active{background:var(--primary-bg);color:var(--primary-fg);border-color:var(--primary-bg);}

.day-th.is-ferie .day-name{color:var(--ferie-text);font-weight:600;}
.day-th.is-ferie{background:var(--ferie-bg);}
.btn-day.active{background:var(--ferie-text);color:var(--primary-fg);border-color:var(--ferie-text);}

/* Section rows */
.sec-row td{padding:8px 4px 2px 12px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);border-top:2px solid var(--bg);}
.sec-row.first td{border-top:none;padding-top:6px;}

/* Data rows */
.data-row td{padding:2px 3px;vertical-align:middle;height:30px;}
.data-row td.row-label{text-align:right;padding-right:8px;padding-left:12px;font-size:11px;color:var(--text2);white-space:nowrap;}
.data-row.pause-row td.row-label{color:var(--text3);font-size:11px;font-style:italic;}

.ferie-cell{text-align:center;}
.ferie-badge{font-size:10px;color:var(--ferie-text);font-style:italic;font-weight:500;}

/* Extra rows */
.extra-sec-row td{padding:8px 4px 2px 12px;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);border-top:1px solid var(--border);}
.extra-row td{padding:2px 3px;vertical-align:middle;}
.extra-row td.row-label{text-align:right;padding-right:8px;padding-left:12px;font-size:10px;color:var(--text3);white-space:nowrap;}

/* Spacer */
.total-spacer td{padding:5px 0;background:transparent;border:none;}

/* Total row */
.total-row td{padding:9px 4px;text-align:center;background:var(--total-row-bg);}
.total-row td:first-child{text-align:right;padding-right:8px;padding-left:12px;font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--text3);}
.day-total{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text);display:block;}
.day-total.empty{color:var(--text4);font-weight:400;}
.day-target{display:block;font-size:10px;color:var(--text4);margin-top:1px;}

/* Time input */
.tw{position:relative;}
.ti{
  font-family:var(--mono);font-size:12px;font-weight:500;
  width:100%;text-align:center;
  background:var(--surface2);
  border:1px solid transparent;border-radius:6px;
  padding:5px 2px;color:var(--text);outline:none;
  transition:border-color .12s,background .12s;cursor:pointer;
}
.ti:hover{border-color:var(--border2);background:var(--surface-hover);}
.ti:focus{outline:2px solid var(--text);outline-offset:-1px;background:var(--surface-focus);border-color:transparent;}
.ti::placeholder{color:var(--placeholder);font-size:11px;font-weight:400;border:1px dashed var(--border2);background:transparent;}
.ti:placeholder-shown{background:transparent;border:1px dashed var(--border);}
.ti.auto-val{color:var(--text3);font-style:italic;background:transparent;}
.btn-rm{position:absolute;right:1px;top:50%;transform:translateY(-50%);background:none;border:none;color:transparent;cursor:pointer;font-size:11px;padding:2px 3px;border-radius:3px;transition:color .1s,background .1s;line-height:1;}
.tw:hover .btn-rm{color:var(--text3);}
.btn-rm:hover{color:var(--red)!important;background:var(--red-bg);}

/* Picker */
.picker{position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);box-shadow:0 8px 24px rgba(0,0,0,0.10);z-index:9999;width:82px;max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.picker::-webkit-scrollbar{width:3px;}
.picker::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.po{font-family:var(--mono);font-size:12px;padding:6px 0;cursor:pointer;color:var(--text);text-align:center;transition:background .07s;}
.po:hover{background:var(--surface-hover);}
.po.sel{background:var(--primary-bg);color:var(--primary-fg);font-weight:600;}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);backdrop-filter:blur(3px);z-index:500;align-items:center;justify-content:center;padding:14px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--r-xl);border:1px solid var(--border2);padding:22px;width:100%;max-width:760px;box-shadow:0 24px 64px rgba(0,0,0,0.12);max-height:92vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;letter-spacing:-0.02em;margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.tpl-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.tpl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}

/* Dropdown */
.dropdown{position:relative;display:inline-block;}
.dropdown-menu{
  display:none;position:absolute;top:calc(100% + 1px);right:0;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--r-lg);box-shadow:0 8px 24px rgba(0,0,0,0.10);
  z-index:300;min-width:260px;overflow:hidden;
}
.dropdown:hover .dropdown-menu,
.dropdown:focus-within .dropdown-menu{ display:block; }
.dropdown-menu::before{
  content:'';position:absolute;top:-8px;left:0;right:0;height:8px;
}
.dropdown-item{
  display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;
  font-family:var(--sans);background:transparent;border:none;
  padding:11px 14px;cursor:pointer;
  transition:background .1s;box-sizing:border-box;
}
.dropdown-item:hover{background:var(--surface-hover);}
.dropdown-item+.dropdown-item{border-top:1px solid var(--border);}
.dropdown-item-icon{
  width:28px;height:28px;border-radius:7px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
  color:var(--text2);
}
.dropdown-item-text{}
.dropdown-item-label{
  font-size:13px;font-weight:500;color:var(--text);
  line-height:1.2;margin-bottom:2px;display:block;
}
.dropdown-item-desc{
  font-size:11px;color:var(--text3);line-height:1.3;display:block;
}

/* Context menu */
.ctx-menu{
  position:fixed;background:var(--surface);
  border:0.5px solid var(--border2);border-radius:var(--r-lg);
  box-shadow:0 4px 20px rgba(0,0,0,0.10),0 1px 4px rgba(0,0,0,0.06);
  z-index:9999;min-width:200px;padding:5px;
}
.ctx-item{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  font-family:var(--sans);font-size:13px;font-weight:400;
  color:var(--text2);background:transparent;border:none;
  padding:8px 12px;cursor:pointer;border-radius:8px;
  transition:background .08s,color .08s;white-space:nowrap;
}
.ctx-item:hover{background:var(--surface-hover);color:var(--text);}
.ctx-item.danger{color:var(--red);}
.ctx-item.danger:hover{background:var(--red-bg);color:var(--red);}
.ctx-icon{width:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text3);opacity:0.7;}
.ctx-sep{height:0.5px;background:var(--border);margin:4px 8px;}

/* Hint */
.hint{text-align:center;font-size:11px;color:var(--text3);margin-top:11px;}
.hint code{font-family:var(--mono);font-size:10px;background:var(--surface2);border-radius:4px;padding:1px 4px;color:var(--text3);}

/* Toast */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--primary-bg);color:var(--primary-fg);font-size:12px;font-weight:500;padding:8px 16px;border-radius:99px;box-shadow:0 4px 16px rgba(0,0,0,0.15);opacity:0;pointer-events:none;transition:opacity .2s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}

/* iOS anti-zoom + layout mobile */
@media (max-width:768px){
  .ti{font-size:16px;padding:3px 0;}
}

/* Loading screen */
#loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
.load-err{text-align:center;font-family:var(--sans);padding:24px;max-width:360px;}
.load-err-title{font-size:13px;font-weight:600;color:var(--red);margin-bottom:8px;}
.load-err-msg{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.6;}
.load-err-hint{font-size:10px;color:var(--text3);}
.loading-inner{display:flex;flex-direction:column;align-items:center;gap:12px;}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--text4);animation:pulse 1.2s ease-in-out infinite;}
.loading-label{font-size:12px;color:var(--text3);}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1);}}

.btn:focus-visible,.btn-primary:focus-visible{outline:2px solid var(--text);outline-offset:2px;}
.btn-day:focus-visible{outline:2px solid var(--text);outline-offset:2px;}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important;}
  .loading-dot{animation:none;opacity:0.5;}
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#1A1918;--surface:#242220;--surface2:#2A2826;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
    --text:#F0EFEC;--text2:#9C9A96;--text3:#6B6965;--text4:#4A4845;
    --green:#4ADE80;--red:#F87171;--red-bg:rgba(248,113,113,0.12);
    --blue:#60A5FA;--blue-bg:rgba(96,165,250,0.12);
    --surface-hover:#333130;--surface-focus:#3A3835;
    --total-row-bg:#1F1E1C;--overlay-bg:rgba(0,0,0,0.6);
    --ferie-text:#FB923C;--ferie-bg:rgba(251,146,60,0.10);
    --primary-bg:#E8E6E1;--primary-hover:#D0CEC9;--primary-fg:#111110;
    --neg-border:rgba(248,113,113,0.25);--bonus-border:rgba(96,165,250,0.25);
    --placeholder:#9C9A96;
  }
}
</style>
</head>
<body>

<!-- Loading screen — removed once data is ready -->
<div id="loadingScreen">
  <div class="loading-inner">
    <div class="loading-dot"></div>
    <div class="loading-label">Chargement…</div>
  </div>
</div>

<div class="app">
  <div class="header">
    <div class="brand">
      <div>
        <div class="app-name">Heures Hebdo</div>
        <div class="week-sub" id="weekSub">—</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="dropdown">
        <button class="btn">Semaine type ▾</button>
        <div class="dropdown-menu">
          <button class="dropdown-item" id="btnTpl">
            <div class="dropdown-item-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
            <div class="dropdown-item-text">
              <span class="dropdown-item-label">Éditer la semaine type</span>
              <span class="dropdown-item-desc">Modifier les horaires de référence</span>
            </div>
          </button>
          <button class="dropdown-item" id="btnSaveAsTpl">
            <div class="dropdown-item-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></div>
            <div class="dropdown-item-text">
              <span class="dropdown-item-label">Enregistrer la semaine en cours</span>
              <span class="dropdown-item-desc">Remplace la semaine type actuelle</span>
            </div>
          </button>
        </div>
      </div>
      <button class="btn btn-primary" id="btnNew">Nouvelle semaine</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total semaine</div>
      <div class="stat-val" id="sTotal">—</div>
      <div class="stat-sub" id="sTotalSub"></div>
    </div>
    <div class="stat">
      <div class="stat-label">Delta / objectif</div>
      <div class="stat-val" id="sDelta">—</div>
    </div>
  </div>

  <div class="card">
    <table class="main-table" id="tbl">
      <colgroup><col class="lbl-col"><col><col><col><col><col></colgroup>
      <thead><tr id="thead-row"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <p class="hint">Frappe libre : <code>730</code> → <code>07:30</code> &nbsp;·&nbsp; La pause se calcule automatiquement</p>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">Semaine type</div>
    <div class="modal-sub">Ton planning de référence — configure une fois, rechargé à chaque nouvelle semaine.</div>
    <div class="tpl-stats">
      <div class="stat"><div class="stat-label">Total semaine type</div><div class="stat-val" id="tplTotal">—</div></div>
      <div class="stat"><div class="stat-label">Delta / 35h</div><div class="stat-val" id="tplDelta">—</div></div>
    </div>
    <div class="tpl-card">
      <table class="main-table" id="tplTbl">
        <colgroup><col class="lbl-col"><col><col><col><col><col></colgroup>
        <thead><tr id="tpl-thead"></tr></thead>
        <tbody id="tpl-tbody"></tbody>
      </table>
    </div>
    <div class="modal-actions">
      <button class="btn" id="btnTplCancel">Annuler</button>
      <button class="btn btn-primary" id="btnTplSave">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- Supabase ---
const SUPABASE_URL = 'https://hmznrhoxeptkmstyavbc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_pWEsnpJBGmTpF-3HSqpSxg_fufOVNrF';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Slug from URL — redirect to welcome if missing
const SLUG = window.location.pathname.replace(/^\/+|\/+$/g, '');
if (!SLUG) window.location.href = '/';

async function ensureUser() {
  const { data, error: selErr } = await sb.from('users').select('slug').eq('slug', SLUG).maybeSingle();
  if (selErr) throw new Error('Lecture utilisateur : ' + selErr.message);
  if (!data) {
    const { error: insErr } = await sb.from('users').insert({ slug: SLUG });
    if (insErr) throw new Error('Création utilisateur : ' + insErr.message);
  }
}
async function loadWeek(wk) {
  const { data, error } = await sb.from('weeks').select('data').eq('slug', SLUG).eq('week_key', wk).maybeSingle();
  if (error) throw new Error('Lecture semaine : ' + error.message);
  return data ? data.data : null;
}
async function saveWeek(wk, weekData) {
  const { error } = await sb.from('weeks').upsert(
    { slug: SLUG, week_key: wk, data: weekData }
  );
  if (error) { console.error('saveWeek:', error); showToast('⚠ Erreur sauvegarde : ' + error.message); }
}
async function loadTemplate() {
  const { data, error } = await sb.from('users').select('template').eq('slug', SLUG).maybeSingle();
  if (error) throw new Error('Lecture template : ' + error.message);
  return (data && data.template) ? data.template : JSON.parse(JSON.stringify(DEFAULT_TPL));
}
async function saveTemplate(tpl) {
  const { error } = await sb.from('users').update({ template: tpl }).eq('slug', SLUG);
  if (error) { console.error('saveTemplate:', error); showToast('⚠ Erreur sauvegarde template : ' + error.message); }
}

// --- Constants ---
const DAYS=['lundi','mardi','mercredi','jeudi','vendredi'];
let _tabbing=false;
const DAY_LABELS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
const DAY_TARGET=[8*60,8*60,8*60,8*60,3*60];
const DEFAULT_TPL={
  lundi:   {a1:'07:30',d1:'13:00',a2:'14:00',d2:'17:00'},
  mardi:   {a1:'07:30',d1:'13:00',a2:'14:00',d2:'17:00'},
  mercredi:{a1:'07:30',d1:'13:00',a2:'14:00',d2:'17:00'},
  jeudi:   {a1:'07:30',d1:'13:00',a2:'14:00',d2:'17:00'},
  vendredi:{a1:'07:30',d1:'12:00',a2:'',     d2:'10:30'},
};

function pickerRange(field,di){
  if(field==='a1')return[7*60,9*60];
  if(field==='d1')return di===4?[12*60,14*60]:[12*60,13*60+30];
  if(field==='a2')return di===4?[12*60+30,14*60+30]:[12*60+30,14*60];
  if(field==='d2')return di===4?[12*60,14*60]:[17*60,19*60];
  return[7*60,19*60];
}
function pickerTimes(field,di){const[min,max]=pickerRange(field,di),a=[];for(let t=min;t<=max;t+=5)a.push(fmt(t));return a;}
function pauseTimes(){const a=[];for(let t=0;t<=120;t+=5)a.push(fmt(t));return a;}

function parse(v){
  if(!v||!v.trim())return null;
  v=v.trim().replace(',',':');
  let h,m;
  if(v.includes(':'))[h,m]=v.split(':').map(Number);
  else if(v.length<=2){h=+v;m=0;}
  else if(v.length===3){h=+v[0];m=+v.slice(1);}
  else{h=+v.slice(0,2);m=+v.slice(2);}
  if(isNaN(h)||isNaN(m)||h>23||m>59||h<0||m<0)return null;
  return h*60+m;
}
function fmt(min){
  if(min===null||min===undefined||min<0)return'';
  return String(Math.floor(min/60)).padStart(2,'0')+':'+String(min%60).padStart(2,'0');
}
function fmtD(min){const s=min>=0?'+':'-',a=Math.abs(min);return s+String(Math.floor(a/60)).padStart(2,'0')+':'+String(a%60).padStart(2,'0');}

function weekKey(){
  const d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  const m=new Date(d);m.setDate(diff);m.setHours(0,0,0,0);
  return`${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`;
}
function weekLabel(k){
  const[y,mo,d]=k.split('-').map(Number),m=new Date(y,mo-1,d),f=new Date(m);
  f.setDate(m.getDate()+4);
  const endStr=f.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
  return`Semaine du ${m.getDate()} au ${endStr}`;
}

function calcDay(day,ignoreExtras){
  if(day.ferie)return null;
  return calcDayRaw(day,ignoreExtras);
}
function calcDayRaw(day,ignoreExtras){
  const a1=parse(day.a1),d1=parse(day.d1),a2=parse(day.a2),d2=parse(day.d2);
  if(a1===null)return null;
  let base=null;
  if(d2!==null){
    base=(d1!==null&&a2!==null)?(d1-a1)+(d2-a2):d2-a1;
  } else if(d1!==null){
    base=d1-a1;
  } else {
    return null;
  }
  if(!ignoreExtras)(day.extras||[]).forEach(ex=>{const ea=parse(ex.a),ed=parse(ex.d);if(ea!==null&&ed!==null&&ed>ea)base+=ed-ea;});
  return base;
}
function autoPause(day){
  const d1=parse(day.d1),a2=parse(day.a2);
  if(d1!==null&&a2!==null&&a2>d1)return fmt(a2-d1);
  return null;
}
function getObjective(){
  let obj=35*60;
  DAYS.forEach((dk,di)=>{if(data[WK][dk].ferie)obj-=DAY_TARGET[di];});
  return obj;
}

function getTabInputs(){
  const inputs=[];
  DAYS.forEach(dk=>{
    ['a1','d1','a2','d2'].forEach(f=>{
      const el=document.querySelector(`[data-tabday="${dk}"][data-tabfield="${f}"]`);
      if(el)inputs.push(el);
    });
  });
  return inputs;
}

let _p=null;
function closePicker(){if(_p){_p.remove();_p=null;}}
document.addEventListener('click',e=>{if(!e.target.closest('.tw'))closePicker();});

function openPicker(inp,times,defaultScroll,onSel){
  if(typeof defaultScroll==='function'){onSel=defaultScroll;defaultScroll=null;}
  closePicker();
  const dp=document.createElement('div');dp.className='picker';
  times.forEach(t=>{
    const o=document.createElement('div');
    o.className='po'+(t===inp.value?' sel':'');
    o.textContent=t;
    o.addEventListener('mousedown',e=>{e.preventDefault();onSel(t);closePicker();});
    dp.appendChild(o);
  });
  document.body.appendChild(dp);_p=dp;
  const rect=inp.getBoundingClientRect();
  const dpW=82;
  let left=rect.left+rect.width/2-dpW/2;
  if(left+dpW>window.innerWidth-8)left=window.innerWidth-dpW-8;
  if(left<4)left=4;
  dp.style.top=(rect.bottom+4)+'px';
  dp.style.left=left+'px';
  const scrollTo=defaultScroll||inp.value;
  const target=scrollTo?[...dp.querySelectorAll('.po')].find(o=>o.textContent===scrollTo)||dp.querySelector('.sel'):null;
  if(target)setTimeout(()=>target.scrollIntoView({block:'center'}),0);
}

function makeInput(val,times,onChange,opts={}){
  const wrap=document.createElement('div');wrap.className='tw';
  const inp=document.createElement('input');
  inp.type='text';inp.className='ti';inp.placeholder='--:--';
  if(opts.tabday)inp.dataset.tabday=opts.tabday;
  if(opts.tabfield)inp.dataset.tabfield=opts.tabfield;
  if(opts.autoVal){inp.value=opts.autoVal;inp.classList.add('auto-val');inp.title='Calculée automatiquement — modifiable';}
  else inp.value=val||'';

  inp.addEventListener('click',()=>inp.setSelectionRange(0,9999));
  inp.addEventListener('focus',()=>{
    inp.setSelectionRange(0,9999);
    if(_tabbing){_tabbing=false;return;}
    if(inp.classList.contains('auto-val'))inp.value='';
    inp.classList.remove('auto-val');
    openPicker(inp,times,v=>{inp.value=v;inp.classList.remove('auto-val');onChange(v);});
  });
  inp.addEventListener('input',closePicker);
  inp.addEventListener('blur',()=>{
    setTimeout(()=>{
      const raw=inp.value.trim();
      if(!raw){onChange('');return;}
      const p=parse(raw);
      if(p!==null){const f=fmt(p);inp.value=f;onChange(f);}
    },100);
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Tab'){
      e.preventDefault();
      const inputs=getTabInputs();
      const idx=inputs.indexOf(inp);
      if(idx>=0){
        const next=e.shiftKey?inputs[idx-1]:inputs[idx+1];
        if(next){closePicker();_tabbing=true;next.focus();}
      }
      return;
    }
    if(e.key==='Enter')inp.blur();
    if(e.key==='Escape'){closePicker();inp.blur();}
  });
  if(opts.removable){
    const rm=document.createElement('button');rm.className='btn-rm';rm.textContent='×';rm.title='Supprimer';
    rm.addEventListener('click',e=>{e.preventDefault();opts.onRemove();});
    wrap.appendChild(rm);
  }
  wrap.appendChild(inp);
  return wrap;
}

function rerenderTotals(dayData,sfx){
  DAYS.forEach((dk,di)=>{
    const td=document.getElementById(`tot-${dk}${sfx}`);if(!td)return;
    const day=dayData[dk];

      td.innerHTML='<span class="day-total" style="color:var(--text3);font-style:italic">Férié</span>';
    } else if(v!==null){
      td.innerHTML=`<span class="day-total">${fmt(v)}</span><span class="day-target">${target}</span>`;
    } else {
      td.innerHTML=`<span class="day-total empty">—</span><span class="day-target">${target}</span>`;
    }
  });
}

function updateStats(){
  const totals=DAYS.map(d=>calcDay(data[WK][d]));
  const filled=totals.filter(t=>t!==null);
  const total=filled.reduce((s,t)=>s+t,0);
  const obj=getObjective();
  const delta=total-obj;
  const objH=Math.floor(obj/60),objM=obj%60;
  const objLabel=`/ ${objH}h${objM?String(objM).padStart(2,'0'):''}`;
  const elT=document.getElementById('sTotal'),elSub=document.getElementById('sTotalSub'),elD=document.getElementById('sDelta');
  if(!filled.length){
    elT.textContent='—';elT.className='stat-val';
    elSub.textContent=objLabel;
    elD.textContent='—';elD.className='stat-val';
    const ds=elD.closest('.stat');if(ds){ds.classList.remove('bonus-stat');ds.classList.remove('neg-stat');}
    return;
  }
  elT.textContent=fmt(total);
  elT.className='stat-val '+(total>=obj?'pos':'neg');
  elSub.textContent=objLabel;
  elD.textContent=fmtD(delta);
  const deltaStatEl=elD.closest('.stat');
  if(delta>=30){elD.className='stat-val bonus';if(deltaStatEl){deltaStatEl.classList.add('bonus-stat');deltaStatEl.classList.remove('neg-stat');}}
  else if(delta<0){elD.className='stat-val neg';if(deltaStatEl){deltaStatEl.classList.remove('bonus-stat');deltaStatEl.classList.add('neg-stat');}}
  else{elD.className='stat-val pos';if(deltaStatEl){deltaStatEl.classList.remove('bonus-stat');deltaStatEl.classList.remove('neg-stat');}}
}

function updateTplStats(tplData){
  rerenderTotals(tplData,'_tpl');
  const totals=DAYS.map(dk=>calcDayRaw(tplData[dk]));
  const filled=totals.filter(t=>t!==null);
  const total=filled.reduce((s,t)=>s+t,0);
  const delta=total-35*60;
  const elT=document.getElementById('tplTotal'),elD=document.getElementById('tplDelta');
  if(!filled.length){elT.textContent='—';elT.className='stat-val';elD.textContent='—';elD.className='stat-val';const ds=elD.closest('.stat');if(ds){ds.classList.remove('bonus-stat');ds.classList.remove('neg-stat');}return;}
  elT.textContent=fmt(total);elT.className='stat-val '+(total>=35*60?'pos':'neg');
  elD.textContent=fmtD(delta);
  const deltaStatEl=elD.closest('.stat');
  if(delta>=30){elD.className='stat-val bonus';if(deltaStatEl){deltaStatEl.classList.add('bonus-stat');deltaStatEl.classList.remove('neg-stat');}}
  else if(delta<0){elD.className='stat-val neg';if(deltaStatEl){deltaStatEl.classList.remove('bonus-stat');deltaStatEl.classList.add('neg-stat');}}
  else{elD.className='stat-val pos';if(deltaStatEl){deltaStatEl.classList.remove('bonus-stat');deltaStatEl.classList.remove('neg-stat');}}
}

      data[WK][_dk]={a1:'',d1:'',a2:'',d2:'',extras:[],ferie:false};
      saveWeek(WK,data[WK]);render();
    });
  } else {
    const copyLabel=tplCopiedDay===dk?'Annuler la copie':'Copier ce jour';
    item('<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',copyLabel,'',()=>{
      if(tplCopiedDay===dk){tplCopiedDay=null;}
      else{tplCopiedDay=dk;showToast(`${DAY_LABELS[di]} copié — clique sur un autre jour`);}
      buildTable(document.getElementById('tpl-tbody'),document.getElementById('tpl-thead'),dayData,{isTemplate:true});
      updateTplStats(dayData);setTimeout(applyTableWidths,0);
    });
    item('<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>','Effacer le jour','danger',()=>{
      dayData[dk]={a1:'',d1:'',a2:'',d2:''};
      buildTable(document.getElementById('tpl-tbody'),document.getElementById('tpl-thead'),dayData,{isTemplate:true});
      updateTplStats(dayData);setTimeout(applyTableWidths,0);
    });
  }

  document.body.appendChild(menu);_ctx=menu;
  const rect=e.currentTarget.getBoundingClientRect();
  let top=rect.bottom+4,left=rect.left+rect.width/2-menu.offsetWidth/2;
  if(left+menu.offsetWidth>window.innerWidth-8)left=window.innerWidth-menu.offsetWidth-8;
  if(left<4)left=4;
  menu.style.top=top+'px';menu.style.left=left+'px';
}

function applyTableWidths(){
  let s=document.getElementById('col-widths-style');
  if(!s){s=document.createElement('style');s.id='col-widths-style';document.head.appendChild(s);}
  const tbl=document.getElementById('tbl');
  const tplTbl=document.getElementById('tplTbl');
  const lblW=window.innerWidth<=768?72:90;
  let css='';
  if(tbl){
    const w=tbl.offsetWidth;
    const dayW=Math.floor((w-lblW)/5);
    css+=`#tbl td:first-child,#tbl th:first-child{width:${lblW}px;min-width:${lblW}px;max-width:${lblW}px;}
    #tbl td:not(:first-child),#tbl th:not(:first-child){width:${dayW}px;min-width:${dayW}px;max-width:${dayW}px;}`;
  }
  if(tplTbl&&tplTbl.offsetWidth>0){
    const w2=tplTbl.offsetWidth;
    const dayW2=Math.floor((w2-lblW)/5);
    css+=`#tplTbl td:first-child,#tplTbl th:first-child{width:${lblW}px;min-width:${lblW}px;max-width:${lblW}px;}
    #tplTbl td:not(:first-child),#tplTbl th:not(:first-child){width:${dayW2}px;min-width:${dayW2}px;max-width:${dayW2}px;}`;
  }
  s.textContent=css;
}

function render(){
  document.getElementById('weekSub').textContent=weekLabel(WK);
  buildTable(document.getElementById('tbody'),document.getElementById('thead-row'),data[WK]);
  rerenderTotals(data[WK],'');
  updateStats();
  setTimeout(applyTableWidths,0);
}

// --- Template button handlers ---
let tplWD=null;
document.getElementById('btnSaveAsTpl').addEventListener('click',()=>{
  if(!confirm('Enregistrer les horaires de cette semaine comme semaine type ?'))return;
  const tpl={};
  DAYS.forEach(d=>{
    const day=data[WK][d];
    tpl[d]={a1:day.a1||'',d1:day.d1||'',a2:day.a2||'',d2:day.d2||''};
  });
  currentTpl=tpl;saveTemplate(tpl);
  showToast('Semaine type mise à jour ✓');
});

document.getElementById('btnTpl').addEventListener('click',()=>{
  tplWD=JSON.parse(JSON.stringify(currentTpl));
  DAYS.forEach(d=>{if(!tplWD[d])tplWD[d]={a1:'',d1:'',a2:'',d2:''};});
  buildTable(document.getElementById('tpl-tbody'),document.getElementById('tpl-thead'),tplWD,{isTemplate:true});
  updateTplStats(tplWD);
  document.getElementById('overlay').classList.add('open');
  setTimeout(applyTableWidths,0);
});
document.getElementById('btnTplCancel').addEventListener('click',()=>{document.getElementById('overlay').classList.remove('open');tplWD=null;tplCopiedDay=null;});
document.getElementById('btnTplSave').addEventListener('click',()=>{
  if(tplWD){currentTpl=tplWD;saveTemplate(tplWD);}
  document.getElementById('overlay').classList.remove('open');tplWD=null;tplCopiedDay=null;
  showToast('Semaine type enregistrée ✓');
});
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget){document.getElementById('overlay').classList.remove('open');tplWD=null;}});

document.getElementById('btnNew').addEventListener('click',()=>{
  if(!confirm('Recharger la semaine type ? Les heures saisies seront effacées.'))return;
  const tpl=JSON.parse(JSON.stringify(currentTpl));
  DAYS.forEach(d=>{const dt=tpl[d]||{a1:'',d1:'',a2:'',d2:''};data[WK][d]={...dt,extras:[],ferie:false};});
  saveWeek(WK,data[WK]);copiedDay=null;render();
});

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&copiedDay){copiedDay=null;render();}});

// Re-apply on resize (handles split-view in Chrome)
const _ro=new ResizeObserver(()=>applyTableWidths());
const _tbl=document.getElementById('tbl');if(_tbl)_ro.observe(_tbl);
const _tplTbl=document.getElementById('tplTbl');if(_tplTbl)_ro.observe(_tplTbl);

function fixColumnWidths(){
  const tbl=document.getElementById('tbl');if(!tbl)return;
  const cols=tbl.querySelectorAll('colgroup col');
  cols[0].style.width='90px';
  for(let i=1;i<cols.length;i++)cols[i].style.width='';
}

// --- Jours fériés France ---
function getEaster(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m+114)/31)-1,day=((h+l-7*m+114)%31)+1;
  return new Date(y,mo,day);
}
function getFrenchHolidays(y){
  const e=getEaster(y);
  const add=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  const k=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return new Set([
    `${y}-01-01`,`${y}-05-01`,`${y}-05-08`,`${y}-07-14`,
    `${y}-08-15`,`${y}-11-01`,`${y}-11-11`,`${y}-12-25`,
    k(add(e,1)),k(add(e,39)),k(add(e,50)),
  ]);
}

// --- Async init ---
async function init(){
  try {
    await ensureUser();
    currentTpl = await loadTemplate();
    const weekData = await loadWeek(WK);
    data[WK] = weekData || {};
    DAYS.forEach(d=>{
      if(!data[WK][d])data[WK][d]={a1:'',d1:'',a2:'',d2:'',extras:[],ferie:false};
      if(!data[WK][d].extras)data[WK][d].extras=[];
      if(data[WK][d].ferie===undefined)data[WK][d].ferie=false;
    });
    if(!weekData){
      const holidays=getFrenchHolidays(new Date().getFullYear());
      DAYS.forEach((dk,di)=>{
        const d=new Date(WK);d.setDate(d.getDate()+di);
        const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        if(holidays.has(k))data[WK][dk].ferie=true;
      });
    }
    render();
    applyTableWidths();
    fixColumnWidths();
  } catch(err) {
    console.error('Erreur de chargement :', err);
    document.getElementById('loadingScreen').innerHTML =
      `<div class="load-err">
        <div class="load-err-title">Erreur de connexion Supabase</div>
        <div class="load-err-msg">${err.message}</div>
        <div class="load-err-hint">Recharge la page ou contacte l'admin.</div>
      </div>`;
    return;
  }
  document.getElementById('loadingScreen').remove();
}

init();
</script>
